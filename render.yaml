services:
  - type: web
    name: emotion-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: "if [ -d 'backend' ]; then PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port $PORT; else uvicorn main:app --host 0.0.0.0 --port $PORT; fi"
    envVars:
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12
    autoDeploy: true
    healthCheckPath: /health
